      <stop offset="0%" style="stop-color:#0B1F16;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#08130F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0B1F16;stop-opacity:1"/>
